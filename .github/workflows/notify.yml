name: 식단 알림 발송

on:
  schedule:
    # 평일 오전 08:20 KST = UTC 전날 23:20 (일~목)
    - cron: '20 23 * * 0-4'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 식단 알림 발송
        env:
          MM_WEBHOOK_URL: ${{ secrets.MM_WEBHOOK_URL }}
        run: node scripts/notify.js
