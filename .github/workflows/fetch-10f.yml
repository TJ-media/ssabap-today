name: 10층 주간 식단 수집

on:
  schedule:
    # 평일 오전 06:00 KST = UTC 전날 21:00 (일~목)
    - cron: '0 21 * * 0-4'
  workflow_dispatch:

jobs:
  fetch-10f:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 의존성 설치
        run: npm install

      - name: 10층 식단표 수집 및 파싱
        env:
          MM_LOGIN_JSON: ${{ secrets.MM_LOGIN_JSON }}
          MM_MENU_CHANNEL_ID: ${{ secrets.MM_MENU_CHANNEL_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/fetch-10f.js

      - name: 파싱 결과 커밋 및 푸시
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add data-10f/
          if git diff --staged --quiet; then
            echo "변경사항 없음"
          else
            git commit -m "10층 주간 식단 업데이트 $(TZ=Asia/Seoul date +'%Y-%m-%d')"
            git pull --rebase origin ${{ github.ref_name }}
            git push
          fi
